<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deepfake Detective | Cyber Games</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    min-height: 100vh; min-height: 100dvh;
    background: radial-gradient(ellipse at top, #1a0820 0%, #02000a 80%);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: #e0e0e0; overflow-x: hidden; padding: 16px 16px 60px;
  }

  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: radial-gradient(1px 1px at 50% 50%, #fff, transparent);
    background-size: 200% 200%; opacity: 0.18; z-index: 0; pointer-events: none;
  }

  .container { max-width: 760px; margin: 0 auto; position: relative; z-index: 1; }

  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; flex-wrap: wrap; gap: 8px; }
  .back-link {
    color: #66ccff; text-decoration: none; font-family: 'Courier New', monospace;
    font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase;
    padding: 6px 12px; border: 1px solid rgba(102, 204, 255, 0.4); border-radius: 20px;
    transition: all 0.2s;
  }
  .back-link:hover, .back-link:focus-visible { background: rgba(102, 204, 255, 0.1); color: #fff; outline: none; }

  header { text-align: center; margin-bottom: 18px; }
  h1 {
    font-size: clamp(1.5rem, 4.5vw, 2.2rem); font-weight: 200;
    letter-spacing: 4px; text-transform: uppercase;
    background: linear-gradient(90deg, #66ccff, #ff66cc, #66ccff);
    background-size: 200% 100%;
    -webkit-background-clip: text; background-clip: text; color: transparent;
    animation: hueShift 5s linear infinite;
  }
  @keyframes hueShift { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
  .subtitle { color: #c8d8ff; font-size: 0.85rem; letter-spacing: 3px; text-transform: uppercase; margin-top: 8px; font-style: italic; }

  /* Stats */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }

  .stat {
    background: rgba(0, 10, 30, 0.7);
    border: 1px solid rgba(102, 204, 255, 0.25);
    border-radius: 10px;
    padding: 10px 8px;
    text-align: center;
    backdrop-filter: blur(8px);
  }

  .stat-label {
    font-family: 'Courier New', monospace;
    font-size: 0.6rem;
    letter-spacing: 1.5px;
    color: #8aa0c0;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .stat-value {
    font-size: 1.3rem;
    font-weight: 700;
    font-family: 'Courier New', monospace;
    color: #66ccff;
    text-shadow: 0 0 10px rgba(102, 204, 255, 0.5);
  }

  .stat-value.score { color: #00ffff; }
  .stat-value.streak { color: #ffaa00; text-shadow: 0 0 10px rgba(255, 170, 0, 0.5); }

  /* Question card */
  .question {
    background: rgba(0, 10, 25, 0.7);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 14px;
    backdrop-filter: blur(8px);
  }

  .question-prompt {
    font-size: 1rem;
    color: #fff;
    font-weight: 600;
    margin-bottom: 12px;
    text-align: center;
  }

  /* Choice cards */
  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .choice {
    padding: 16px;
    background: rgba(20, 20, 40, 0.7);
    border: 2px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.25s;
    text-align: left;
    color: inherit;
    font-family: inherit;
  }

  .choice:hover, .choice:focus-visible {
    transform: translateY(-3px);
    border-color: rgba(102, 204, 255, 0.6);
    box-shadow: 0 6px 20px rgba(102, 204, 255, 0.2);
    outline: none;
  }

  .choice:disabled { cursor: wait; opacity: 0.7; transform: none; }

  .choice.correct {
    border-color: rgba(0, 255, 136, 0.7);
    background: rgba(0, 60, 30, 0.5);
    box-shadow: 0 0 25px rgba(0, 255, 136, 0.3);
  }

  .choice.wrong {
    border-color: rgba(255, 80, 100, 0.7);
    background: rgba(60, 0, 30, 0.5);
    box-shadow: 0 0 25px rgba(255, 80, 100, 0.3);
  }

  .choice.correct.unpicked { opacity: 0.7; }

  .choice-label {
    display: inline-block;
    width: 22px; height: 22px;
    background: rgba(102, 204, 255, 0.2);
    color: #66ccff;
    border-radius: 4px;
    text-align: center;
    line-height: 22px;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    margin-right: 8px;
    font-size: 0.85rem;
  }

  .choice-img {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 8px;
    background: linear-gradient(135deg, #1a1a2a, #0a0a1a);
    border: 1px solid rgba(255, 255, 255, 0.1);
    margin-bottom: 8px;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 0.7rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-align: center;
    padding: 8px;
  }

  /* SVG faces - one human-like, one with subtle deepfake flaws */
  .choice-img svg { width: 100%; height: 100%; }

  .choice-text {
    font-size: 0.85rem;
    color: #fff;
    line-height: 1.4;
    margin-bottom: 4px;
    font-weight: 600;
  }

  .choice-meta {
    font-family: 'Courier New', monospace;
    font-size: 0.65rem;
    color: #8aa0c0;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Reveal */
  .reveal {
    background: rgba(0, 20, 40, 0.7);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 14px;
    backdrop-filter: blur(10px);
    display: none;
  }

  .reveal.visible { display: block; animation: revealIn 0.4s ease; }
  @keyframes revealIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .reveal.correct { border: 1px solid rgba(0, 255, 136, 0.5); }
  .reveal.wrong { border: 1px solid rgba(255, 80, 100, 0.5); }

  .reveal-tag {
    font-family: 'Courier New', monospace;
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
    font-weight: bold;
  }

  .reveal.correct .reveal-tag { color: #00ff88; text-shadow: 0 0 10px rgba(0, 255, 136, 0.5); }
  .reveal.wrong .reveal-tag { color: #ff6b88; text-shadow: 0 0 10px rgba(255, 80, 100, 0.5); }

  .tells-title {
    font-family: 'Courier New', monospace;
    font-size: 0.65rem;
    letter-spacing: 2px;
    color: #ffcc66;
    text-transform: uppercase;
    margin-top: 10px;
    margin-bottom: 6px;
  }

  .tells {
    list-style: none;
    padding: 0;
  }

  .tells li {
    padding: 5px 0 5px 18px;
    position: relative;
    font-size: 0.83rem;
    color: #d8e8ff;
    line-height: 1.5;
  }

  .tells li::before {
    content: '\2192';
    position: absolute;
    left: 0;
    color: #ffcc66;
  }

  .next-btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(90deg, rgba(102, 204, 255, 0.2), rgba(255, 0, 200, 0.2));
    border: 1px solid rgba(102, 204, 255, 0.6);
    color: #fff;
    border-radius: 14px;
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 12px;
    transition: all 0.2s;
  }
  .next-btn:hover, .next-btn:focus-visible {
    background: linear-gradient(90deg, rgba(102, 204, 255, 0.35), rgba(255, 0, 200, 0.35));
    box-shadow: 0 0 25px rgba(102, 204, 255, 0.4);
    outline: none;
  }

  /* End screen */
  .game-over {
    text-align: center;
    padding: 28px 20px;
    background: linear-gradient(135deg, rgba(0, 30, 60, 0.7), rgba(40, 0, 60, 0.7));
    border: 1px solid rgba(102, 204, 255, 0.5);
    border-radius: 16px;
    backdrop-filter: blur(10px);
    display: none;
  }

  .game-over.visible { display: block; animation: revealIn 0.5s ease; }

  .game-over h2 {
    font-size: 1.4rem; color: #fff; letter-spacing: 4px;
    text-transform: uppercase; margin-bottom: 8px;
    background: linear-gradient(90deg, #66ccff, #ff66cc);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }

  .gg-score {
    font-size: 3rem; font-weight: 700;
    color: #66ccff; font-family: 'Courier New', monospace;
    text-shadow: 0 0 25px rgba(102, 204, 255, 0.5);
    margin-bottom: 6px;
  }

  .gg-grade {
    font-size: 0.95rem; color: #c8d8ff;
    letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 18px; font-family: 'Courier New', monospace;
  }

  .restart-btn {
    padding: 14px 28px;
    background: rgba(102, 204, 255, 0.2);
    border: 1px solid rgba(102, 204, 255, 0.6);
    color: #66ccff;
    border-radius: 30px;
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .restart-btn:hover, .restart-btn:focus-visible {
    background: rgba(102, 204, 255, 0.4);
    color: #fff;
    box-shadow: 0 0 25px rgba(102, 204, 255, 0.4);
    outline: none;
  }

  @media (max-width: 480px) {
    .choices { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="top-bar">
    <a href="games.html" class="back-link">&#8592; Cyber Games</a>
    <span class="back-link" style="border-color: rgba(255, 0, 200, 0.4); color: #ff66cc; cursor: default;" id="caseTag">Case 1 of 6</span>
  </div>

  <header>
    <h1>Deepfake Detective</h1>
    <div class="subtitle">One is real. One is generated. Pick the real.</div>
  </header>

  <div class="stats">
    <div class="stat"><div class="stat-label">Score</div><div class="stat-value score" id="score">0</div></div>
    <div class="stat"><div class="stat-label">Streak</div><div class="stat-value streak" id="streak">0</div></div>
    <div class="stat"><div class="stat-label">Accuracy</div><div class="stat-value" id="accuracy">--</div></div>
  </div>

  <main>
    <div class="question" id="questionPanel">
      <div class="question-prompt" id="prompt">Pick the real one.</div>
      <div class="choices" id="choices"></div>
    </div>

    <div class="reveal" id="reveal" role="status" aria-live="polite">
      <div class="reveal-tag" id="revealTag"></div>
      <div id="revealText" style="font-size: 0.9rem; color: #d8e8ff; line-height: 1.6;"></div>
      <div class="tells-title">Tells you should have caught</div>
      <ul class="tells" id="tellsList"></ul>
      <button class="next-btn" id="nextBtn" type="button">Next case</button>
    </div>

    <div class="game-over" id="gameOver" role="status">
      <h2>Investigation Complete</h2>
      <div class="gg-score" id="ggScore">0</div>
      <div class="gg-grade" id="ggGrade"></div>
      <div style="color:#c8d8ff;font-size:0.85rem;margin-bottom:18px;font-family:'Courier New',monospace;" id="ggSummary"></div>
      <button class="restart-btn" id="restartBtn" type="button">Run another case</button>
    </div>
  </main>
</div>

<script>
// Each case: a real vs a fake. We use stylized SVG portraits and short text descriptions.
// In a production version you would load curated real photos vs known deepfake samples.

const cases = [
  {
    type: 'photo',
    prompt: 'A LinkedIn profile photo of a software engineer in San Francisco. One is a real person, one is AI-generated. Which is real?',
    realIdx: 0,
    options: [
      { svg: makePortraitSvg('real_a'), label: 'Profile A', meta: 'Created 2019' },
      { svg: makePortraitSvg('fake_a'), label: 'Profile B', meta: 'Created last week' }
    ],
    tells: [
      'Profile B was created last week, with no posting history. Real LinkedIn profiles accumulate slowly over years.',
      'AI-generated faces often have asymmetric earrings, mismatched ear shapes, or backgrounds that smear in odd places.',
      'Always check post history, connection age, and whether the photo appears via reverse-image search elsewhere.'
    ]
  },
  {
    type: 'audio',
    prompt: 'Two voicemails claiming to be from your CEO asking you to wire $40,000. One is real (left previously), one is a deepfake. Which is real?',
    realIdx: 1,
    options: [
      { textPreview: 'Crystal clear audio. No background noise. CEO sounds slightly different than usual but words are perfect.', label: 'Voicemail A', meta: 'Background: silent' },
      { textPreview: 'Real-world background noise (car horn, his dog barking). Voice sounds like the CEO mid-sentence, casual, with um/uh.', label: 'Voicemail B', meta: 'Background: ambient noise' }
    ],
    tells: [
      'AI voice clones often arrive with too-clean audio. No background, no breathing, no mouth sounds. Real human recordings carry environment.',
      'Filler words ("um", "uh", "you know") are difficult for many voice models. Suspiciously fluent = suspiciously fake.',
      'For high-stakes requests, ALWAYS verify out-of-band. Hang up and call the person on a known number before acting.'
    ]
  },
  {
    type: 'photo',
    prompt: 'Two product photos for an e-commerce listing. One is a real product photo, one was AI-generated. Which is real?',
    realIdx: 1,
    options: [
      { svg: makeProductSvg('fake'), label: 'Listing A', meta: 'Hands have 6 fingers in one frame' },
      { svg: makeProductSvg('real'), label: 'Listing B', meta: 'Tagged on the seller\'s site' }
    ],
    tells: [
      'AI-generated product photos often have impossible details: extra fingers, misaligned text, melted screws, illogical reflections.',
      'Real product photos are tagged across multiple seller sites and product databases. Reverse image search finds matches.',
      'Always cross-check listings against the manufacturer\'s real site before purchasing.'
    ]
  },
  {
    type: 'video',
    prompt: 'Two short video clips of a politician. One is a real speech, one is a deepfake making them say something they never said. Which is real?',
    realIdx: 0,
    options: [
      { textPreview: 'The politician blinks naturally throughout. Audio matches lip movement perfectly. Background audience reacts realistically.', label: 'Clip A', meta: 'Posted by Reuters' },
      { textPreview: 'Politician barely blinks. Lip sync is slightly off in dramatic moments. Background looks like a stock photo.', label: 'Clip B', meta: 'Posted by anonymous account' }
    ],
    tells: [
      'Early deepfakes had reduced blink rates because training data over-represented eyes-open frames. Modern fakes fix this but legacy fakes still leak.',
      'Lip sync is hardest in moments of strong emotion or rapid speech. Look for syllable-level mismatches.',
      'Source matters enormously. A clip from a known news org is verifiable. An anonymous clip on social media should never be trusted as primary evidence.'
    ]
  },
  {
    type: 'photo',
    prompt: 'Two property photos in a Zillow-style listing. One is a real home, one is AI-staged. Which is real?',
    realIdx: 1,
    options: [
      { svg: makeRoomSvg('fake'), label: 'Listing A', meta: 'Photo metadata stripped' },
      { svg: makeRoomSvg('real'), label: 'Listing B', meta: 'Photo timestamped, agent on file' }
    ],
    tells: [
      'AI room images get architectural details wrong: doors that lead nowhere, windows on impossible walls, art with text that is gibberish.',
      'Real photos have EXIF metadata. Fakes are usually stripped. (But missing metadata alone is not proof.)',
      'Cross-reference listings with the agent of record and prior sale history through the local MLS.'
    ]
  },
  {
    type: 'photo',
    prompt: 'Two emails inviting you to a conference. Each has a "speaker bio" headshot. One is a real speaker, one is a fabricated AI-generated person used to give the conference more credibility. Which is real?',
    realIdx: 0,
    options: [
      { svg: makePortraitSvg('real_b'), label: 'Speaker A', meta: 'Cited in 12 papers, has a Wikipedia page' },
      { svg: makePortraitSvg('fake_b'), label: 'Speaker B', meta: 'No web footprint, no LinkedIn' }
    ],
    tells: [
      'Fake conferences pad their speaker rosters with AI-generated faces and fabricated bios to look credible.',
      'A real industry expert has citations, conference talks, blog posts, podcast appearances. A fake speaker has nothing but a polished portrait.',
      'Before submitting payment, search the speaker by name in Google Scholar, LinkedIn, GitHub, and YouTube. Real expertise leaves traces.'
    ]
  }
];

function makePortraitSvg(variant) {
  // Stylized portraits with subtle "tells" baked into the fakes
  const colors = {
    real_a: { skin: '#d4a374', hair: '#3a2814', bg: '#2a3a4a' },
    fake_a: { skin: '#e8b888', hair: '#4a3020', bg: '#5a4a3a' },
    real_b: { skin: '#a0764e', hair: '#1a1208', bg: '#1a2a3a' },
    fake_b: { skin: '#c89870', hair: '#2a1c10', bg: '#3a2a3a' }
  }[variant] || { skin: '#c0a080', hair: '#3a2a18', bg: '#2a2a2a' };

  const isFake = variant.startsWith('fake');

  return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="${colors.bg}"/>
    ${isFake ? `<defs><filter id="smear"><feGaussianBlur stdDeviation="0.4"/></filter></defs>` : ''}
    <g ${isFake ? 'filter="url(#smear)"' : ''}>
      <ellipse cx="50" cy="40" rx="22" ry="26" fill="${colors.skin}"/>
      <path d="M 28 32 Q 50 14 72 32 L 70 22 Q 50 8 30 22 Z" fill="${colors.hair}"/>
      <ellipse cx="42" cy="40" rx="2" ry="3" fill="#fff"/>
      <ellipse cx="42" cy="41" rx="1" ry="1.5" fill="#1a1a2a"/>
      <ellipse cx="58" cy="40" rx="2" ry="3" fill="#fff"/>
      <ellipse cx="58" cy="41" rx="${isFake ? '1.3' : '1'}" ry="1.5" fill="#1a1a2a"/>
      <path d="M 48 50 L 50 56 L 52 50" stroke="${colors.skin}" stroke-width="1" fill="none" stroke-linecap="round" filter="brightness(0.85)"/>
      <path d="M 44 64 Q 50 ${isFake ? '67' : '66'} 56 64" stroke="#5a3020" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <ellipse cx="50" cy="92" rx="26" ry="14" fill="${colors.bg}"/>
      <rect x="36" y="80" width="28" height="20" fill="#1a1a2a"/>
      ${isFake ? `<circle cx="32" cy="44" r="0.8" fill="#fff" opacity="0.4"/><rect x="28" y="55" width="3" height="2" fill="${colors.skin}" opacity="0.5"/>` : ''}
    </g>
  </svg>`;
}

function makeProductSvg(variant) {
  const isFake = variant === 'fake';
  return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="${isFake ? '#3a2a3a' : '#2a2a3a'}"/>
    <rect x="20" y="30" width="60" height="40" rx="4" fill="#${isFake ? '6a8a9a' : '5a7a8a'}"/>
    <rect x="22" y="32" width="56" height="36" rx="2" fill="#${isFake ? '0a1a2a' : '0a0a1a'}"/>
    <text x="50" y="52" text-anchor="middle" fill="#${isFake ? 'a0c0e0' : 'fff'}" font-family="monospace" font-size="${isFake ? '5' : '6'}">${isFake ? 'TEHCNQLO' : 'TECHCO'}</text>
    <rect x="${isFake ? '79.5' : '79'}" y="${isFake ? '36' : '35'}" width="2" height="2" fill="#888" opacity="${isFake ? '0.5' : '1'}"/>
    <ellipse cx="50" cy="78" rx="30" ry="3" fill="#000" opacity="${isFake ? '0.2' : '0.4'}"/>
    ${isFake ? `<rect x="68" y="42" width="6" height="1" fill="#aaccee" opacity="0.6"/><rect x="68" y="46" width="4" height="1" fill="#aaccee" opacity="0.5"/>` : ''}
  </svg>`;
}

function makeRoomSvg(variant) {
  const isFake = variant === 'fake';
  return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="${isFake ? '#d8c0a0' : '#c8b090'}"/>
    <rect x="0" y="0" width="100" height="50" fill="${isFake ? '#a8c8e8' : '#98b8d8'}"/>
    <rect x="${isFake ? '60' : '20'}" y="20" width="20" height="20" fill="#${isFake ? '4a6a8a' : '3a5a7a'}"/>
    <rect x="${isFake ? '60' : '20'}" y="20" width="20" height="20" fill="none" stroke="#fff" stroke-width="1"/>
    ${isFake ? `<rect x="55" y="34" width="2" height="6" fill="#3a5a7a"/>` : ''}
    <rect x="40" y="55" width="20" height="35" fill="#${isFake ? '5a3020' : '4a2818'}"/>
    <rect x="${isFake ? '5' : '70'}" y="55" width="${isFake ? '90' : '20'}" height="${isFake ? '5' : '35'}" fill="${isFake ? '#8a6a4a' : '#7a5a3a'}"/>
    <ellipse cx="50" cy="92" rx="40" ry="3" fill="#000" opacity="0.2"/>
    ${isFake ? `<rect x="2" y="60" width="2" height="2" fill="#5a3020"/><rect x="0" y="65" width="3" height="3" fill="#5a3020" opacity="0.5"/>` : ''}
  </svg>`;
}

const promptEl = document.getElementById('prompt');
const choicesEl = document.getElementById('choices');
const reveal = document.getElementById('reveal');
const revealTag = document.getElementById('revealTag');
const revealText = document.getElementById('revealText');
const tellsList = document.getElementById('tellsList');
const nextBtn = document.getElementById('nextBtn');
const gameOver = document.getElementById('gameOver');
const ggScore = document.getElementById('ggScore');
const ggGrade = document.getElementById('ggGrade');
const ggSummary = document.getElementById('ggSummary');
const restartBtn = document.getElementById('restartBtn');
const scoreEl = document.getElementById('score');
const streakEl = document.getElementById('streak');
const accuracyEl = document.getElementById('accuracy');
const caseTag = document.getElementById('caseTag');
const questionPanel = document.getElementById('questionPanel');

let idx = 0;
let score = 0;
let streak = 0;
let correct = 0;
let answered = 0;

function shuffleCases() {
  const arr = [...cases];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

let deck = shuffleCases();

function showCase() {
  const c = deck[idx];
  promptEl.textContent = c.prompt;
  caseTag.textContent = `Case ${idx + 1} of ${deck.length}`;
  reveal.classList.remove('visible');
  questionPanel.style.display = '';
  choicesEl.innerHTML = '';

  // Optionally swap which side is "real" so users cannot rely on position
  const flip = Math.random() < 0.5;
  const order = flip ? [1, 0] : [0, 1];
  const trueRealIdx = flip ? (1 - c.realIdx) : c.realIdx;

  order.forEach((origIdx, displayIdx) => {
    const opt = c.options[origIdx];
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'choice';
    const labels = ['A', 'B'];
    let media;
    if (opt.svg) media = `<div class="choice-img">${opt.svg}</div>`;
    else media = `<div class="choice-img" style="font-size:0.7rem;line-height:1.4;">${opt.textPreview}</div>`;
    btn.innerHTML = `${media}<div class="choice-text"><span class="choice-label">${labels[displayIdx]}</span>${opt.label}</div><div class="choice-meta">${opt.meta}</div>`;
    btn.addEventListener('click', () => decide(origIdx === c.realIdx, btn, c, trueRealIdx, displayIdx));
    choicesEl.appendChild(btn);
  });
}

function decide(isCorrect, btnEl, c, realDisplayIdx, displayIdx) {
  Array.from(choicesEl.children).forEach((b, i) => {
    b.disabled = true;
    if (i === realDisplayIdx) b.classList.add('correct');
    if (b === btnEl && !isCorrect) b.classList.add('wrong');
    if (i === realDisplayIdx && b !== btnEl) b.classList.add('unpicked');
  });
  answered++;

  if (isCorrect) {
    correct++;
    streak++;
    score += 100 + Math.min(streak * 10, 50);
    revealTag.textContent = streak > 1 ? `Spotted it - streak x${streak}` : 'Spotted it';
    reveal.className = 'reveal correct visible';
    revealText.textContent = 'You picked the real one. The other was AI-generated.';
    if (window.CyberSounds) CyberSounds.correct();
  } else {
    streak = 0;
    score = Math.max(0, score - 30);
    revealTag.textContent = 'Fooled';
    reveal.className = 'reveal wrong visible';
    revealText.textContent = 'You picked the fake. AI-generated content is getting harder to spot. Read the tells below carefully.';
    if (window.CyberSounds) CyberSounds.wrong();
  }

  tellsList.innerHTML = '';
  c.tells.forEach(t => {
    const li = document.createElement('li');
    li.textContent = t;
    tellsList.appendChild(li);
  });

  scoreEl.textContent = score;
  streakEl.textContent = streak;
  accuracyEl.textContent = Math.round((correct / answered) * 100) + '%';
}

nextBtn.addEventListener('click', () => {
  if (window.CyberSounds) CyberSounds.click();
  idx++;
  if (idx >= deck.length) {
    endRound();
  } else {
    showCase();
  }
});

function endRound() {
  questionPanel.style.display = 'none';
  reveal.classList.remove('visible');

  ggScore.textContent = score;
  const accuracy = Math.round((correct / deck.length) * 100);
  let grade;
  if (accuracy === 100) grade = 'Forensic-grade eye';
  else if (accuracy >= 83) grade = 'Hard to fool';
  else if (accuracy >= 50) grade = 'Average detector';
  else grade = 'AI fools you. Read more carefully.';
  ggGrade.textContent = grade;
  ggSummary.innerHTML = `${correct} / ${deck.length} correct &middot; ${accuracy}% accuracy`;
  gameOver.classList.add('visible');
  if (window.CyberSounds) {
    if (accuracy >= 67) CyberSounds.win();
    else CyberSounds.lose();
  }
}

restartBtn.addEventListener('click', () => {
  idx = 0; score = 0; streak = 0; correct = 0; answered = 0;
  scoreEl.textContent = 0; streakEl.textContent = 0; accuracyEl.textContent = '--';
  deck = shuffleCases();
  gameOver.classList.remove('visible');
  showCase();
});

showCase();
</script>
<script src="sounds.js"></script>
</body>
</html>
