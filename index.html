<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber 8-Ball | Security Decision Oracle</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    background: #0a0a0f;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: #e0e0e0;
    overflow-x: hidden;
    overflow-y: auto;
    position: relative;
    padding: 16px 16px 70px;
    padding-bottom: calc(70px + env(safe-area-inset-bottom));
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridScroll 20s linear infinite;
    z-index: 0;
  }

  @keyframes gridScroll {
    0% { transform: translate(0, 0); }
    100% { transform: translate(40px, 40px); }
  }

  /* Floating binary background */
  .binary-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    opacity: 0.06;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    color: #00ff88;
    line-height: 1.4;
    word-break: break-all;
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 26px;
    width: 100%;
    max-width: 520px;
  }

  h1 {
    font-size: clamp(1.5rem, 4vw, 2.2rem);
    font-weight: 300;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #00ff88;
    text-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
    text-align: center;
  }

  h1 span {
    display: block;
    font-size: 0.45em;
    letter-spacing: 6px;
    color: #b8c4d0;
    margin-top: 8px;
    text-shadow: 0 0 12px rgba(184, 196, 208, 0.3);
  }

  /* Fog layer behind the ball */
  .fog {
    position: absolute;
    width: 600px;
    height: 600px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 0;
    filter: blur(40px);
    opacity: 0.55;
  }

  .fog-blob {
    position: absolute;
    border-radius: 50%;
    mix-blend-mode: screen;
  }

  .fog-blob.b1 {
    width: 320px; height: 320px;
    background: radial-gradient(circle, rgba(0, 255, 136, 0.45), transparent 70%);
    top: 20%; left: 15%;
    animation: drift1 14s ease-in-out infinite;
  }
  .fog-blob.b2 {
    width: 380px; height: 380px;
    background: radial-gradient(circle, rgba(0, 200, 255, 0.35), transparent 70%);
    top: 40%; left: 50%;
    animation: drift2 18s ease-in-out infinite;
  }
  .fog-blob.b3 {
    width: 280px; height: 280px;
    background: radial-gradient(circle, rgba(140, 80, 255, 0.4), transparent 70%);
    top: 55%; left: 30%;
    animation: drift3 16s ease-in-out infinite;
  }
  .fog-blob.b4 {
    width: 340px; height: 340px;
    background: radial-gradient(circle, rgba(0, 255, 200, 0.3), transparent 70%);
    top: 30%; left: 60%;
    animation: drift4 20s ease-in-out infinite;
  }

  @keyframes drift1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(60px, -40px) scale(1.2); }
  }
  @keyframes drift2 {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    50% { transform: translate(-40%, -60%) scale(1.15); }
  }
  @keyframes drift3 {
    0%, 100% { transform: translate(0, 0) scale(1.1); }
    50% { transform: translate(-50px, 50px) scale(0.9); }
  }
  @keyframes drift4 {
    0%, 100% { transform: translate(0, 0) scale(0.95); }
    50% { transform: translate(40px, 30px) scale(1.25); }
  }

  /* 8-Ball container */
  .ball-container {
    position: relative;
    width: 300px;
    height: 300px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  /* The ball itself */
  .ball {
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #3a3a3a, #1a1a1a 40%, #0d0d0d 70%, #000 100%);
    box-shadow:
      0 0 60px rgba(0, 255, 136, 0.15),
      0 0 120px rgba(0, 255, 136, 0.05),
      inset 0 -20px 40px rgba(0, 0, 0, 0.8),
      inset 0 10px 30px rgba(255, 255, 255, 0.05);
    position: relative;
    transition: transform 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .ball:active {
    transform: scale(0.97);
  }

  .ball.shaking {
    animation: shake 0.6s ease-in-out;
  }

  @keyframes shake {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    15% { transform: translate(-8px, -4px) rotate(-2deg); }
    30% { transform: translate(6px, 3px) rotate(1.5deg); }
    45% { transform: translate(-5px, -2px) rotate(-1deg); }
    60% { transform: translate(4px, 2px) rotate(0.8deg); }
    75% { transform: translate(-2px, -1px) rotate(-0.5deg); }
    90% { transform: translate(1px, 1px) rotate(0.2deg); }
  }

  /* Shine overlay */
  .ball::before {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 25%, rgba(255,255,255,0.12), transparent 50%);
    z-index: 3;
    pointer-events: none;
  }

  /* The "8" on the ball */
  .eight {
    position: absolute;
    top: 22%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    transition: opacity 0.3s ease;
  }

  .eight-circle {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 45%, #ffffff, #e0e0e0);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
  }

  .eight-circle span {
    font-size: 38px;
    font-weight: 800;
    color: #1a1a1a;
    font-family: Georgia, serif;
  }

  .ball.shaking .eight,
  .ball.revealing .eight {
    opacity: 0;
  }

  /* Answer window (the blue triangle area) */
  .answer-window {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    background: radial-gradient(circle, #001a33, #000d1a);
    border: 2px solid rgba(0, 255, 136, 0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    opacity: 0;
    transition: opacity 0.5s ease;
    z-index: 2;
  }

  .ball.revealing .answer-window {
    opacity: 1;
  }

  /* Triangle shape inside answer window */
  .triangle {
    width: 0;
    height: 0;
    border-left: 50px solid transparent;
    border-right: 50px solid transparent;
    border-bottom: 85px solid rgba(0, 40, 80, 0.6);
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .answer-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 11px;
    font-weight: 600;
    text-align: center;
    color: #00ff88;
    text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
    line-height: 1.3;
    width: 100px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    animation: fadeInAnswer 0.8s ease forwards;
    opacity: 0;
  }

  @keyframes fadeInAnswer {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
    100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }

  /* Glow pulse when revealing */
  .ball.revealing {
    box-shadow:
      0 0 60px rgba(0, 255, 136, 0.25),
      0 0 120px rgba(0, 255, 136, 0.1),
      inset 0 -20px 40px rgba(0, 0, 0, 0.8),
      inset 0 10px 30px rgba(255, 255, 255, 0.05);
  }

  /* Prompt text */
  .prompt {
    font-size: 0.95rem;
    color: #d0e8dc;
    letter-spacing: 2px;
    text-transform: uppercase;
    animation: pulse 2s ease-in-out infinite;
    text-align: center;
    text-shadow: 0 0 14px rgba(0, 255, 136, 0.35);
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.75; }
    50% { opacity: 1; }
  }

  .prompt.hidden {
    opacity: 0;
    animation: none;
  }

  /* Answer display below ball */
  .answer-display {
    min-height: 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    opacity: 0;
    transition: opacity 0.5s ease 0.3s;
  }

  .answer-display.visible {
    opacity: 1;
  }

  .answer-display .full-answer {
    font-size: clamp(1.1rem, 3vw, 1.4rem);
    font-weight: 600;
    color: #00ff88;
    text-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
    text-align: center;
    max-width: 400px;
    line-height: 1.4;
  }

  .answer-display .category {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    padding: 4px 14px;
    border-radius: 20px;
    font-weight: 600;
  }

  .category.positive {
    color: #00ff88;
    border: 1px solid rgba(0, 255, 136, 0.3);
    background: rgba(0, 255, 136, 0.05);
  }

  .category.neutral {
    color: #ffaa00;
    border: 1px solid rgba(255, 170, 0, 0.3);
    background: rgba(255, 170, 0, 0.05);
  }

  .category.negative {
    color: #ff4444;
    border: 1px solid rgba(255, 68, 68, 0.3);
    background: rgba(255, 68, 68, 0.05);
  }

  /* Question input area */
  .question-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
    max-width: 420px;
    padding: 0 20px;
  }

  .question-input {
    width: 100%;
    padding: 12px 20px;
    border-radius: 30px;
    border: 1px solid rgba(0, 255, 136, 0.2);
    background: rgba(0, 255, 136, 0.03);
    color: #e0e0e0;
    font-size: 0.95rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
    text-align: center;
  }

  .question-input::placeholder {
    color: #8aa099;
    font-style: italic;
    opacity: 1;
  }

  .question-input:focus {
    border-color: rgba(0, 255, 136, 0.5);
    box-shadow: 0 0 20px rgba(0, 255, 136, 0.1);
  }

  .ball-container:focus-visible {
    outline: 3px solid #00ff88;
    outline-offset: 8px;
    border-radius: 50%;
  }

  .sr-only {
    position: absolute;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0,0,0,0);
    white-space: nowrap; border: 0;
  }

  /* Particle effects */
  .particle {
    position: fixed;
    width: 3px;
    height: 3px;
    background: #00ff88;
    border-radius: 50%;
    pointer-events: none;
    z-index: 10;
    opacity: 0;
  }

  /* Terminal-style footer */
  .footer {
    position: fixed;
    bottom: 16px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 0.72rem;
    color: #b8c4d0;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'Courier New', monospace;
    text-shadow: 0 0 10px rgba(0, 255, 136, 0.2);
    padding: 0 16px;
  }

  .footer::before {
    content: '> ';
    color: #00ff88;
    text-shadow: 0 0 8px rgba(0, 255, 136, 0.6);
  }

  /* Scan line effect */
  .scanline {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.03) 2px,
      rgba(0, 0, 0, 0.03) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  @media (max-width: 480px) {
    .content { gap: 20px; }
    .ball-container, .ball {
      width: 240px;
      height: 240px;
    }
    .fog { width: 460px; height: 460px; }
    .eight-circle {
      width: 56px;
      height: 56px;
    }
    .eight-circle span {
      font-size: 30px;
    }
    .answer-window {
      width: 110px;
      height: 110px;
    }
    .triangle {
      border-left-width: 42px;
      border-right-width: 42px;
      border-bottom-width: 70px;
    }
    .answer-text {
      font-size: 10px;
      width: 86px;
    }
    h1 { letter-spacing: 3px; }
    h1 span { letter-spacing: 4px; font-size: 0.5em; }
    .question-input { font-size: 16px; padding: 11px 18px; } /* 16px prevents iOS zoom */
    .footer { font-size: 0.65rem; letter-spacing: 1.5px; }
  }

  @media (max-height: 700px) {
    .content { gap: 18px; }
    body { justify-content: flex-start; padding-top: 20px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .fog-blob, body::before { animation: none !important; }
  }
</style>
</head>
<body>

<div class="binary-bg" id="binaryBg"></div>
<div class="scanline"></div>

<div class="content">
  <h1>Cyber 8-Ball<span>Security Decision Oracle</span></h1>

  <div class="question-area">
    <label for="questionInput" class="sr-only">Type your security question</label>
    <input type="text" class="question-input" id="questionInput"
           placeholder="Ask your security question..."
           maxlength="120"
           autocomplete="off"
           aria-describedby="ballHint">
    <span id="ballHint" class="sr-only">Press Enter to get an answer from the Cyber 8-Ball.</span>
  </div>

  <div class="ball-container" id="ballContainer"
       role="button" tabindex="0"
       aria-label="Cyber 8-Ball. Activate to receive a security decision.">
    <div class="fog" aria-hidden="true">
      <div class="fog-blob b1"></div>
      <div class="fog-blob b2"></div>
      <div class="fog-blob b3"></div>
      <div class="fog-blob b4"></div>
    </div>
    <div class="ball" id="ball">
      <div class="eight">
        <div class="eight-circle"><span>8</span></div>
      </div>
      <div class="answer-window">
        <div class="triangle"></div>
        <div class="answer-text" id="answerText"></div>
      </div>
    </div>
  </div>

  <p class="prompt" id="prompt">Click the ball or press Enter</p>

  <div class="answer-display" id="answerDisplay" role="status" aria-live="polite" aria-atomic="true">
    <div class="full-answer" id="fullAnswer"></div>
    <div class="category" id="categoryBadge"></div>
  </div>
</div>

<div class="footer">cyber_8ball v1.0 - classified</div>

<script>
const answers = [
  // Positive / Green light
  { text: "Ship it - but check the logs first", cat: "positive" },
  { text: "Absolutely, after a pentest", cat: "positive" },
  { text: "Green light - your firewall agrees", cat: "positive" },
  { text: "The SOC team approves", cat: "positive" },
  { text: "Yes, and rotate your keys while you're at it", cat: "positive" },
  { text: "Go for it - zero-day odds are in your favor", cat: "positive" },
  { text: "MFA says yes", cat: "positive" },
  { text: "Proceed - but log everything", cat: "positive" },
  { text: "Threat model looks clean. Do it.", cat: "positive" },
  { text: "Your SIEM has given the blessing", cat: "positive" },
  { text: "The vulnerability scan came back clean", cat: "positive" },
  { text: "Yes - even the auditors would approve", cat: "positive" },

  // Neutral / Ask again
  { text: "Check the CVE database and ask again", cat: "neutral" },
  { text: "Consult your incident response plan first", cat: "neutral" },
  { text: "Better run another vulnerability scan", cat: "neutral" },
  { text: "The answer lies in the audit logs", cat: "neutral" },
  { text: "Spin up a sandbox and find out", cat: "neutral" },
  { text: "Reply hazy - too much encrypted traffic", cat: "neutral" },
  { text: "Ask your CISO, not me", cat: "neutral" },
  { text: "Try again after patching Tuesday", cat: "neutral" },
  { text: "The answer requires more threat intel", cat: "neutral" },
  { text: "Run it by compliance first", cat: "neutral" },
  { text: "My crystal ball needs a firmware update", cat: "neutral" },
  { text: "Cannot predict - still decrypting", cat: "neutral" },

  // Negative / Don't do it
  { text: "Absolutely not - that's a CVE waiting to happen", cat: "negative" },
  { text: "Do NOT deploy on Friday", cat: "negative" },
  { text: "Your attack surface says no", cat: "negative" },
  { text: "Nope - it's always DNS", cat: "negative" },
  { text: "The red team already exploited that", cat: "negative" },
  { text: "Hard no - have you seen the threat landscape?", cat: "negative" },
  { text: "Not unless you want a breach notification", cat: "negative" },
  { text: "That's a phishing trap and you know it", cat: "negative" },
  { text: "Negative - your certificates expired last week", cat: "negative" },
  { text: "The honeypot says stay away", cat: "negative" },
  { text: "Denied - insufficient access controls", cat: "negative" },
  { text: "Don't even think about it - patch first", cat: "negative" },
  { text: "Your password is 'password' - fix that first", cat: "negative" },
  { text: "Risk score: critical. That's a no.", cat: "negative" },

  // 10 more - extra flavor
  { text: "Zero trust says trust no one - including this idea", cat: "negative" },
  { text: "Have you tried turning the firewall off and on again?", cat: "neutral" },
  { text: "The SOC analyst just spit out their coffee. Don't.", cat: "negative" },
  { text: "Approved - but document it for the auditors", cat: "positive" },
  { text: "Roll the dice - your EDR has your back", cat: "positive" },
  { text: "Signs point to a data exfiltration risk", cat: "negative" },
  { text: "Encrypt it, sign it, then ship it", cat: "positive" },
  { text: "Outlook unclear - phishing simulation in progress", cat: "neutral" },
  { text: "Yes, but only behind a VPN", cat: "positive" },
  { text: "The blue team disagrees. Loudly.", cat: "negative" },
];

// Fisher-Yates shuffle for true randomness - reshuffled each session
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
shuffle(answers);

const ball = document.getElementById('ball');
const ballContainer = document.getElementById('ballContainer');
const answerText = document.getElementById('answerText');
const prompt = document.getElementById('prompt');
const answerDisplay = document.getElementById('answerDisplay');
const fullAnswer = document.getElementById('fullAnswer');
const categoryBadge = document.getElementById('categoryBadge');
const questionInput = document.getElementById('questionInput');
const binaryBg = document.getElementById('binaryBg');

let isAnimating = false;
let lastAnswerIndex = -1;

// Generate binary background
function generateBinary() {
  let text = '';
  const chars = '01';
  for (let i = 0; i < 3000; i++) {
    text += chars[Math.floor(Math.random() * 2)];
    if (Math.random() < 0.05) text += ' ';
  }
  binaryBg.textContent = text;
}
generateBinary();

function getRandomAnswer() {
  let idx;
  do {
    idx = Math.floor(Math.random() * answers.length);
  } while (idx === lastAnswerIndex);
  lastAnswerIndex = idx;
  return answers[idx];
}

function spawnParticles() {
  const rect = ballContainer.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;

  for (let i = 0; i < 12; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    document.body.appendChild(particle);

    const angle = (Math.PI * 2 * i) / 12;
    const distance = 80 + Math.random() * 60;
    const tx = Math.cos(angle) * distance;
    const ty = Math.sin(angle) * distance;

    particle.style.left = cx + 'px';
    particle.style.top = cy + 'px';

    particle.animate([
      { opacity: 1, transform: 'translate(0, 0) scale(1)' },
      { opacity: 0, transform: `translate(${tx}px, ${ty}px) scale(0)` }
    ], {
      duration: 600 + Math.random() * 400,
      easing: 'ease-out',
      fill: 'forwards'
    }).onfinish = () => particle.remove();
  }
}

function shakeBall() {
  if (isAnimating) return;
  isAnimating = true;

  // Reset state
  ball.classList.remove('revealing');
  answerDisplay.classList.remove('visible');
  answerText.textContent = '';
  prompt.classList.add('hidden');

  // Shake
  ball.classList.add('shaking');

  setTimeout(() => {
    ball.classList.remove('shaking');

    const answer = getRandomAnswer();

    // Reveal answer
    ball.classList.add('revealing');
    answerText.textContent = answer.text;
    fullAnswer.textContent = answer.text;

    const catLabels = { positive: 'Approved', neutral: 'Inconclusive', negative: 'Denied' };
    categoryBadge.textContent = catLabels[answer.cat];
    categoryBadge.className = 'category ' + answer.cat;

    spawnParticles();

    setTimeout(() => {
      answerDisplay.classList.add('visible');
    }, 300);

    setTimeout(() => {
      isAnimating = false;
    }, 1500);
  }, 700);
}

ballContainer.addEventListener('click', shakeBall);
ballContainer.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    shakeBall();
  }
});

questionInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    shakeBall();
  }
});

// Subtle idle float animation
let floatAngle = 0;
function idleFloat() {
  if (!isAnimating) {
    floatAngle += 0.02;
    const y = Math.sin(floatAngle) * 4;
    ballContainer.style.transform = `translateY(${y}px)`;
  }
  requestAnimationFrame(idleFloat);
}
idleFloat();
</script>
</body>
</html>
