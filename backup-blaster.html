<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backup Blaster | Cyber Games</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { min-height: 100%; }
  body {
    min-height: 100vh;
    min-height: 100dvh;
    background: radial-gradient(ellipse at top, #081b24 0%, #02000a 82%);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: #e8eef8;
    padding: 16px 16px 60px;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, #fff, transparent),
      radial-gradient(1px 1px at 80% 70%, #aff, transparent),
      linear-gradient(90deg, transparent 95%, rgba(0,255,255,0.08) 96%);
    background-size: 220% 220%, 220% 220%, 46px 46px;
    opacity: 0.2;
    pointer-events: none;
  }
  .container { max-width: 780px; margin: 0 auto; position: relative; z-index: 1; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; flex-wrap: wrap; gap: 8px; }
  .back-link {
    color: #00ffff; text-decoration: none; font-family: 'Courier New', monospace;
    font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase;
    padding: 6px 12px; border: 1px solid rgba(0, 255, 255, 0.4); border-radius: 20px;
  }
  .back-link:hover, .back-link:focus-visible { background: rgba(0,255,255,0.1); color: #fff; outline: none; }
  header { text-align: center; margin-bottom: 20px; }
  h1 {
    font-size: clamp(1.5rem, 4.8vw, 2.25rem); font-weight: 200; letter-spacing: 4px; text-transform: uppercase;
    background: linear-gradient(90deg, #00ffff, #00ff88, #ffaa00, #00ffff);
    background-size: 300% 100%;
    -webkit-background-clip: text; background-clip: text; color: transparent;
    animation: hueShift 6s linear infinite;
  }
  @keyframes hueShift { to { background-position: 300% 50%; } }
  .subtitle { color: #c8d8ff; font-size: 0.82rem; letter-spacing: 3px; text-transform: uppercase; margin-top: 8px; font-style: italic; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
  .stat {
    background: rgba(0, 20, 36, 0.68); border: 1px solid rgba(0,255,255,0.22); border-radius: 8px;
    padding: 10px 8px; text-align: center; backdrop-filter: blur(8px);
  }
  .stat-label { font-family: 'Courier New', monospace; font-size: 0.58rem; letter-spacing: 1.4px; color: #8aa0c0; text-transform: uppercase; margin-bottom: 4px; }
  .stat-value { font-family: 'Courier New', monospace; font-size: 1.28rem; font-weight: 700; color: #00ffff; text-shadow: 0 0 10px rgba(0,255,255,0.45); }
  .stat-value.clean { color: #00ff88; } .stat-value.loss { color: #ffaa00; }
  .incident-card {
    background: linear-gradient(180deg, rgba(3, 30, 44, 0.94), rgba(7, 12, 28, 0.96));
    border: 1px solid rgba(0,255,255,0.26); border-radius: 8px; padding: 18px;
    box-shadow: 0 14px 46px rgba(0,0,0,0.48), inset 0 1px 0 rgba(255,255,255,0.08);
    margin-bottom: 14px;
  }
  .incident-head { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 12px; align-items: flex-start; }
  .incident-title { font-size: 1.22rem; font-weight: 800; color: #fff; line-height: 1.25; }
  .incident-meta { color: #99b7c9; font-family: 'Courier New', monospace; font-size: 0.72rem; letter-spacing: 1.4px; text-transform: uppercase; margin-top: 4px; }
  .severity { border: 1px solid currentColor; border-radius: 999px; padding: 5px 10px; font-family: 'Courier New', monospace; font-size: 0.68rem; letter-spacing: 1.5px; color: #ff5f8f; text-transform: uppercase; white-space: nowrap; }
  .incident-copy { color: #dce8ff; line-height: 1.55; margin-bottom: 16px; }
  .timeline { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
  .snapshot {
    position: relative;
    border: 1px solid rgba(255,255,255,0.13);
    border-radius: 8px;
    background: rgba(0,0,0,0.28);
    color: #d8efff;
    padding: 12px 8px;
    min-height: 78px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    text-align: left;
  }
  .snapshot:hover, .snapshot:focus-visible, .snapshot.selected { border-color: #00ffff; outline: none; box-shadow: 0 0 18px rgba(0,255,255,0.18); }
  .snapshot.selected::after { content: 'selected'; position: absolute; right: 7px; bottom: 6px; color: #00ff88; font-size: 0.58rem; letter-spacing: 1px; text-transform: uppercase; }
  .snapshot:disabled { cursor: default; opacity: 0.7; }
  .snap-time { display: block; font-weight: 800; color: #fff; margin-bottom: 5px; }
  .snap-note { display: block; color: #9bb2c8; font-size: 0.68rem; line-height: 1.3; }
  .actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
  .action-btn, .execute-btn, .restart-btn {
    border: 2px solid rgba(0,255,255,0.35); border-radius: 8px; background: rgba(0, 10, 30, 0.72);
    color: #fff; padding: 13px 10px; cursor: pointer; font-family: inherit; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;
  }
  .action-btn:hover, .action-btn:focus-visible, .action-btn.selected { transform: translateY(-2px); border-color: #00ff88; outline: none; background: rgba(0,255,136,0.12); }
  .action-btn:disabled { cursor: default; opacity: 0.7; transform: none; }
  .execute-btn, .restart-btn { width: 100%; background: linear-gradient(90deg, #00ffff, #00ff88); color: #041020; border: 0; }
  .execute-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .reveal { display: none; border-radius: 8px; border: 1px solid rgba(0,255,255,0.22); background: rgba(0, 16, 38, 0.72); padding: 14px; line-height: 1.55; margin-top: 12px; }
  .reveal.visible { display: block; animation: revealIn 0.28s ease; }
  @keyframes revealIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .reveal-title { font-family: 'Courier New', monospace; font-size: 0.78rem; letter-spacing: 2px; text-transform: uppercase; color: #00ffff; margin-bottom: 6px; }
  .lesson { margin-top: 16px; padding: 14px; border-radius: 8px; background: rgba(0,0,0,0.28); border: 1px dashed rgba(255,255,255,0.14); color: #b8c8d8; font-size: 0.88rem; line-height: 1.55; }
  @media (max-width: 680px) { .stats, .timeline { grid-template-columns: repeat(2, 1fr); } .actions { grid-template-columns: 1fr; } .incident-head { flex-direction: column; } }
  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
</style>
</head>
<body>
<div class="container">
  <div class="top-bar"><a class="back-link" href="games.html">&larr; Games</a></div>
  <header>
    <h1>Backup Blaster</h1>
    <p class="subtitle">Restore before ransom spreads</p>
  </header>
  <main>
    <section class="stats" aria-label="Game statistics">
      <div class="stat"><div class="stat-label">Incident</div><div id="round" class="stat-value">1/6</div></div>
      <div class="stat"><div class="stat-label">Score</div><div id="score" class="stat-value">0</div></div>
      <div class="stat"><div class="stat-label">Clean</div><div id="clean" class="stat-value clean">0</div></div>
      <div class="stat"><div class="stat-label">Data Loss</div><div id="loss" class="stat-value loss">0h</div></div>
    </section>
    <section class="incident-card" aria-labelledby="incidentTitle">
      <div class="incident-head">
        <div><h2 id="incidentTitle" class="incident-title"></h2><div id="incidentMeta" class="incident-meta"></div></div>
        <div id="severity" class="severity"></div>
      </div>
      <p id="incidentCopy" class="incident-copy"></p>
      <div id="timeline" class="timeline" aria-label="Available backup snapshots"></div>
      <div id="actions" class="actions" aria-label="Recovery actions"></div>
      <button id="execute" class="execute-btn" type="button" disabled>Execute recovery</button>
      <div id="reveal" class="reveal" role="status" aria-live="polite"></div>
    </section>
    <p class="lesson">Goal: restore the latest clean snapshot after isolating the blast radius. Newer is not always better if the attacker already poisoned it.</p>
  </main>
</div>
<script src="sounds.js"></script>
<script src="nav.js"></script>
<script>
(() => {
  const incidents = [
    { title: 'Payroll share encrypted', system: 'Finance file server', severity: 'Critical', copy: 'Files changed rapidly at 02:14. EDR shows the first malicious write at 01:58. RPO target: 4 hours.', bestAction: 'isolate', bestSnap: 1, explain: 'The 01:30 snapshot is the latest clean point before malicious writes began. Isolate first so the restore is not re-encrypted.' },
    { title: 'CRM records scrambled', system: 'Sales SaaS sync', severity: 'High', copy: 'API token abuse started at 09:42. The 10:00 export includes corrupted contacts. RPO target: 2 hours.', bestAction: 'disable', bestSnap: 1, explain: 'Disable the bad token, then restore 09:00. The 10:00 export is newer but already dirty.' },
    { title: 'Warehouse terminals locked', system: 'Operations subnet', severity: 'High', copy: 'Ransom note appeared at 18:20. Network telemetry shows lateral movement began at 17:40. RPO target: 6 hours.', bestAction: 'segment', bestSnap: 2, explain: 'Segment the subnet, then use 16:00. It loses a bit more work but avoids the lateral movement window.' },
    { title: 'Wiki pages defaced', system: 'Knowledge base', severity: 'Medium', copy: 'Unauthorized edits started at 13:12. The attacker account is still active. RPO target: 8 hours.', bestAction: 'disable', bestSnap: 1, explain: 'Disable the account, then restore 12:00. Paying or restoring while the account remains active just repeats the incident.' },
    { title: 'Build artifacts poisoned', system: 'CI package store', severity: 'Critical', copy: 'Malicious package was published at 04:22. The 05:00 backup contains it. RPO target: 12 hours.', bestAction: 'isolate', bestSnap: 1, explain: 'The package store must be isolated before rolling back to 03:00. Latest backup is contaminated.' },
    { title: 'Endpoint fleet rollback', system: 'Laptop management', severity: 'High', copy: 'A bad script rolled out at 11:05. Devices checked in across 25 minutes. RPO target: 1 hour.', bestAction: 'disable', bestSnap: 0, explain: 'Disable the rollout script and use the 11:00 state. It is just before the mistake and preserves most work.' }
  ];
  const labels = ['Newest', 'Safe-ish', 'Older', 'Archive'];
  const snapHours = [0, 1, 3, 8];
  const actions = [
    { id: 'isolate', label: 'Isolate' },
    { id: 'disable', label: 'Disable Access' },
    { id: 'segment', label: 'Segment' },
    { id: 'pay', label: 'Pay Ransom' }
  ];
  const state = { index: 0, score: 0, clean: 0, loss: 0, snap: null, action: null, locked: false };
  const el = {
    round: document.getElementById('round'), score: document.getElementById('score'), clean: document.getElementById('clean'), loss: document.getElementById('loss'),
    title: document.getElementById('incidentTitle'), meta: document.getElementById('incidentMeta'), severity: document.getElementById('severity'),
    copy: document.getElementById('incidentCopy'), timeline: document.getElementById('timeline'), actions: document.getElementById('actions'),
    execute: document.getElementById('execute'), reveal: document.getElementById('reveal')
  };
  function sound(name) { if (window.CyberSounds && CyberSounds[name]) CyberSounds[name](); }
  function updateStats() {
    el.round.textContent = Math.min(state.index + 1, incidents.length) + '/' + incidents.length;
    el.score.textContent = state.score;
    el.clean.textContent = state.clean;
    el.loss.textContent = state.loss + 'h';
  }
  function render() {
    const incident = incidents[state.index];
    state.snap = null; state.action = null; state.locked = false;
    el.title.textContent = incident.title;
    el.meta.textContent = incident.system;
    el.severity.textContent = incident.severity;
    el.copy.textContent = incident.copy;
    el.reveal.className = 'reveal'; el.reveal.innerHTML = '';
    el.execute.disabled = true;
    el.timeline.innerHTML = labels.map((label, i) => '<button class="snapshot" type="button" data-snap="' + i + '"><span class="snap-time">T-' + snapHours[i] + 'h</span><span class="snap-note">' + label + ' snapshot</span></button>').join('');
    el.actions.innerHTML = actions.map(action => '<button class="action-btn" type="button" data-action="' + action.id + '">' + action.label + '</button>').join('');
    el.timeline.querySelectorAll('button').forEach(btn => btn.addEventListener('click', () => {
      if (state.locked) return;
      state.snap = Number(btn.dataset.snap);
      el.timeline.querySelectorAll('button').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected'); sound('click'); checkReady();
    }));
    el.actions.querySelectorAll('button').forEach(btn => btn.addEventListener('click', () => {
      if (state.locked) return;
      state.action = btn.dataset.action;
      el.actions.querySelectorAll('button').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected'); sound('click'); checkReady();
    }));
    updateStats();
  }
  function checkReady() { el.execute.disabled = state.snap === null || state.action === null; }
  function finish() {
    const rating = state.clean >= 5 ? 'Resilience operator' : state.clean >= 3 ? 'Recovery capable' : 'Backup tourist';
    el.copy.textContent = 'Final score: ' + state.score + '. Clean restores: ' + state.clean + '. Data loss: ' + state.loss + ' hours.';
    el.title.textContent = 'Run complete: ' + rating;
    el.meta.textContent = 'RPO is a design choice, not a wish';
    el.timeline.innerHTML = '';
    el.actions.innerHTML = '';
    el.execute.remove();
    el.reveal.className = 'reveal visible';
    el.reveal.innerHTML = '<div class="reveal-title">Takeaway</div>Backups only count if they are clean, recent enough, isolated from attackers, and regularly tested.<button class="restart-btn" type="button" onclick="location.reload()">Restart</button>';
    sound(state.clean >= 3 ? 'win' : 'lose');
  }
  function execute() {
    if (state.locked || state.snap === null || state.action === null) return;
    state.locked = true;
    const incident = incidents[state.index];
    const snapCorrect = state.snap === incident.bestSnap;
    const actionCorrect = state.action === incident.bestAction;
    if (snapCorrect && actionCorrect) {
      state.score += 220;
      state.clean++;
      state.loss += snapHours[state.snap];
      sound('win');
    } else {
      state.score += snapCorrect || actionCorrect ? 70 : 0;
      state.loss += snapCorrect ? snapHours[state.snap] : snapHours[state.snap] + 3;
      sound('wrong');
    }
    updateStats();
    el.execute.disabled = true;
    el.timeline.querySelectorAll('button').forEach(btn => btn.disabled = true);
    el.actions.querySelectorAll('button').forEach(btn => btn.disabled = true);
    el.reveal.className = 'reveal visible';
    el.reveal.innerHTML = [
      '<div class="reveal-title">' + (snapCorrect && actionCorrect ? 'Clean restore' : 'Recovery gap') + '</div>',
      '<p>' + incident.explain + '</p>',
      '<button class="restart-btn" type="button">' + (state.index === incidents.length - 1 ? 'Finish run' : 'Next incident') + '</button>'
    ].join('');
    el.reveal.querySelector('button').focus();
    el.reveal.querySelector('button').addEventListener('click', () => { state.index++; if (state.index >= incidents.length) finish(); else render(); });
  }
  el.execute.addEventListener('click', execute);
  render();
})();
</script>
</body>
</html>
