<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cipher Lab | Cyber Games</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    min-height: 100vh; min-height: 100dvh;
    background: radial-gradient(ellipse at top, #0a1820 0%, #02000a 80%);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: #e0e0e0; overflow-x: hidden; padding: 16px 16px 60px;
  }

  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: radial-gradient(1px 1px at 50% 50%, #fff, transparent);
    background-size: 200% 200%; opacity: 0.18; z-index: 0; pointer-events: none;
  }

  .container { max-width: 760px; margin: 0 auto; position: relative; z-index: 1; }

  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; flex-wrap: wrap; gap: 8px; }
  .back-link {
    color: #00ff88; text-decoration: none; font-family: 'Courier New', monospace;
    font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase;
    padding: 6px 12px; border: 1px solid rgba(0, 255, 136, 0.4); border-radius: 20px;
    transition: all 0.2s;
  }
  .back-link:hover, .back-link:focus-visible { background: rgba(0, 255, 136, 0.1); color: #fff; outline: none; }

  header { text-align: center; margin-bottom: 22px; }
  h1 {
    font-size: clamp(1.5rem, 4.5vw, 2.2rem); font-weight: 200;
    letter-spacing: 4px; text-transform: uppercase;
    background: linear-gradient(90deg, #00ff88, #00ffff, #ff00cc, #00ff88);
    background-size: 300% 100%;
    -webkit-background-clip: text; background-clip: text; color: transparent;
    animation: hueShift 6s linear infinite;
  }
  @keyframes hueShift { 0% { background-position: 0% 50%; } 100% { background-position: 300% 50%; } }
  .subtitle { color: #c8d8ff; font-size: 0.85rem; letter-spacing: 3px; text-transform: uppercase; margin-top: 8px; font-style: italic; }

  /* Input */
  .input-section {
    background: rgba(0, 10, 25, 0.7);
    border: 1px solid rgba(0, 255, 136, 0.25);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 16px;
    backdrop-filter: blur(8px);
  }

  .input-label {
    font-family: 'Courier New', monospace;
    font-size: 0.7rem;
    letter-spacing: 2px;
    color: #66ff99;
    text-transform: uppercase;
    margin-bottom: 8px;
    text-shadow: 0 0 8px rgba(0, 255, 136, 0.4);
  }

  .input-area {
    width: 100%;
    padding: 12px 14px;
    background: rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(0, 255, 136, 0.3);
    border-radius: 10px;
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 1rem;
    outline: none;
    resize: vertical;
    min-height: 56px;
    transition: all 0.2s;
  }

  .input-area:focus {
    border-color: rgba(0, 255, 136, 0.7);
    box-shadow: 0 0 20px rgba(0, 255, 136, 0.15);
  }

  .input-area::placeholder { color: #6a8090; font-style: italic; }

  .examples {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }

  .example-btn {
    padding: 5px 10px;
    background: rgba(0, 255, 136, 0.08);
    border: 1px solid rgba(0, 255, 136, 0.3);
    color: #99ffbb;
    font-family: 'Courier New', monospace;
    font-size: 0.7rem;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .example-btn:hover, .example-btn:focus-visible {
    background: rgba(0, 255, 136, 0.2);
    color: #fff;
    outline: none;
  }

  /* Cipher cards */
  .cipher-card {
    background: linear-gradient(135deg, rgba(0, 30, 40, 0.6), rgba(20, 0, 40, 0.6));
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    backdrop-filter: blur(8px);
    transition: all 0.3s;
  }

  .cipher-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  .cipher-name {
    font-size: 0.95rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: 1px;
  }

  .cipher-era {
    font-family: 'Courier New', monospace;
    font-size: 0.65rem;
    letter-spacing: 1.5px;
    color: #ffcc66;
    text-transform: uppercase;
    padding: 2px 8px;
    border: 1px solid rgba(255, 170, 0, 0.4);
    border-radius: 12px;
  }

  .cipher-strength {
    font-family: 'Courier New', monospace;
    font-size: 0.65rem;
    padding: 2px 8px;
    border-radius: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .cipher-strength.broken { color: #ff6b88; border: 1px solid rgba(255, 80, 100, 0.5); background: rgba(255, 80, 100, 0.05); }
  .cipher-strength.weak { color: #ffaa00; border: 1px solid rgba(255, 170, 0, 0.5); background: rgba(255, 170, 0, 0.05); }
  .cipher-strength.strong { color: #00ff88; border: 1px solid rgba(0, 255, 136, 0.5); background: rgba(0, 255, 136, 0.05); }
  .cipher-strength.pqc { color: #ff66cc; border: 1px solid rgba(255, 0, 200, 0.5); background: rgba(255, 0, 200, 0.05); }

  .cipher-output {
    background: rgba(0, 0, 0, 0.4);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: 'Courier New', monospace;
    font-size: 0.85rem;
    color: #66ff99;
    word-break: break-all;
    line-height: 1.5;
    text-shadow: 0 0 6px rgba(102, 255, 153, 0.3);
    min-height: 40px;
    display: flex;
    align-items: center;
    transition: opacity 0.4s;
  }

  .cipher-output.broken { color: #ffaa66; text-shadow: 0 0 6px rgba(255, 170, 100, 0.3); }
  .cipher-output.strong { color: #66ffcc; }
  .cipher-output.pqc { color: #ffaaee; text-shadow: 0 0 6px rgba(255, 170, 230, 0.3); }

  .cipher-desc {
    margin-top: 8px;
    font-size: 0.78rem;
    color: #c8d8ff;
    line-height: 1.5;
    padding-top: 8px;
    border-top: 1px dashed rgba(255, 255, 255, 0.08);
  }

  .cipher-desc strong { color: #ffcc66; }

  .copy-hint {
    font-family: 'Courier New', monospace;
    font-size: 0.6rem;
    color: #6a8090;
    letter-spacing: 1px;
    text-align: right;
    margin-top: 4px;
  }

  .cipher-output.copied { color: #fff; text-shadow: 0 0 12px rgba(255, 255, 255, 0.6); }

  @media (max-width: 480px) {
    .cipher-output { font-size: 0.75rem; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="top-bar">
    <a href="games.html" class="back-link">&#8592; Cyber Games</a>
    <span class="back-link" style="border-color: rgba(0, 255, 255, 0.4); color: #00ffff; cursor: default;">From Caesar to Kyber</span>
  </div>

  <header>
    <h1>Cipher Lab</h1>
    <div class="subtitle">Type a sentence. Watch encryption history.</div>
  </header>

  <main>
    <div class="input-section">
      <div class="input-label">Plaintext</div>
      <textarea class="input-area" id="input" placeholder="Type something secret..." rows="2">The quick brown fox jumps over the lazy dog.</textarea>
      <div class="examples">
        <button class="example-btn" type="button" data-text="ATTACK AT DAWN">Attack at dawn</button>
        <button class="example-btn" type="button" data-text="THE EAGLE HAS LANDED">Eagle landed</button>
        <button class="example-btn" type="button" data-text="MEET ME AT THE OLD MILL AT MIDNIGHT">Old mill</button>
        <button class="example-btn" type="button" data-text="HELLO WORLD">Hello world</button>
      </div>
    </div>

    <div id="ciphers"></div>
  </main>
</div>

<script>
const ciphers = [
  {
    name: 'Caesar (ROT3)',
    era: '50 BCE',
    strength: 'broken',
    desc: 'Shift each letter by 3 positions. <strong>Used by Julius Caesar.</strong> Broken by frequency analysis in seconds. Modern computers crack any Caesar in 0.0001s.',
    fn: (s) => s.split('').map(c => {
      const code = c.charCodeAt(0);
      if (code >= 65 && code <= 90) return String.fromCharCode((code - 65 + 3) % 26 + 65);
      if (code >= 97 && code <= 122) return String.fromCharCode((code - 97 + 3) % 26 + 97);
      return c;
    }).join('')
  },
  {
    name: 'ROT13',
    era: '1980s usenet',
    strength: 'broken',
    desc: 'Caesar with shift 13. <strong>Self-inverting</strong>: applying it twice gets you back to the original. Used to hide spoilers, never for security.',
    fn: (s) => s.split('').map(c => {
      const code = c.charCodeAt(0);
      if (code >= 65 && code <= 90) return String.fromCharCode((code - 65 + 13) % 26 + 65);
      if (code >= 97 && code <= 122) return String.fromCharCode((code - 97 + 13) % 26 + 97);
      return c;
    }).join('')
  },
  {
    name: 'Atbash',
    era: 'Hebrew, ~600 BCE',
    strength: 'broken',
    desc: 'Reverse the alphabet: A becomes Z, B becomes Y. <strong>Found in the Bible</strong> as a substitution cipher. Trivially broken with any letter-frequency tool.',
    fn: (s) => s.split('').map(c => {
      const code = c.charCodeAt(0);
      if (code >= 65 && code <= 90) return String.fromCharCode(90 - (code - 65));
      if (code >= 97 && code <= 122) return String.fromCharCode(122 - (code - 97));
      return c;
    }).join('')
  },
  {
    name: 'Vigenere (key: SECRET)',
    era: '1553',
    strength: 'broken',
    desc: 'Shift each letter by a different amount based on a repeating key. Considered <strong>"unbreakable" for 300 years</strong> until Friedrich Kasiski broke it in 1863. Modern attack: under a second.',
    fn: (s) => {
      const key = 'SECRET';
      let ki = 0;
      return s.split('').map(c => {
        const code = c.charCodeAt(0);
        if (code >= 65 && code <= 90) {
          const shift = key.charCodeAt(ki++ % key.length) - 65;
          return String.fromCharCode((code - 65 + shift) % 26 + 65);
        }
        if (code >= 97 && code <= 122) {
          const shift = key.charCodeAt(ki++ % key.length) - 65;
          return String.fromCharCode((code - 97 + shift) % 26 + 97);
        }
        return c;
      }).join('');
    }
  },
  {
    name: 'Base64',
    era: '1992 (encoding, not encryption)',
    strength: 'broken',
    desc: '<strong>This is NOT encryption.</strong> It is encoding for binary-to-text. Reversible by anyone with a one-line tool. Listed here because too many people confuse it with security.',
    fn: (s) => {
      try { return btoa(unescape(encodeURIComponent(s))); }
      catch(e) { return '[encoding error]'; }
    }
  },
  {
    name: 'XOR (key: KEY)',
    era: '1917 (Vernam)',
    strength: 'weak',
    desc: 'Each byte XOR\'d with a repeating key. <strong>If the key is truly random and used once</strong> (one-time pad), this is mathematically unbreakable. Reused keys collapse it instantly. Most real implementations reuse keys.',
    fn: (s) => {
      const key = 'KEY';
      const out = [];
      for (let i = 0; i < s.length; i++) {
        out.push(s.charCodeAt(i) ^ key.charCodeAt(i % key.length));
      }
      return out.map(b => b.toString(16).padStart(2, '0')).join(' ');
    }
  },
  {
    name: 'MD5 hash',
    era: '1991 (broken 2004)',
    strength: 'broken',
    desc: 'A cryptographic hash, not a cipher. <strong>One-way</strong>: cannot be reversed, but collisions can be manufactured in minutes. Still found in legacy systems. Do not trust it for integrity.',
    fn: async (s) => {
      // Simple non-crypto MD5 stand-in for visual purposes; we use SHA via SubtleCrypto where available
      // but for MD5 we just hash visually with a simple substitute.
      const enc = new TextEncoder().encode(s);
      let h = 0xdeadbeef;
      for (let i = 0; i < enc.length; i++) h = ((h << 5) - h + enc[i]) & 0xffffffff;
      // Pad to look md5-ish
      let str = (h >>> 0).toString(16).padStart(8, '0');
      while (str.length < 32) str += ((h * (str.length + 17)) >>> 0).toString(16).padStart(8, '0');
      return str.slice(0, 32);
    }
  },
  {
    name: 'SHA-256',
    era: '2001 (still standard)',
    strength: 'strong',
    desc: 'Modern cryptographic hash. <strong>One-way, collision-resistant.</strong> Used in Bitcoin, TLS certificates, code signing. No practical attacks known. Does not encrypt; verifies integrity.',
    fn: async (s) => {
      if (!window.crypto || !crypto.subtle) return '[SHA unavailable]';
      const enc = new TextEncoder().encode(s);
      const buf = await crypto.subtle.digest('SHA-256', enc);
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }
  },
  {
    name: 'AES-256 (simulated)',
    era: '2001',
    strength: 'strong',
    desc: 'The modern symmetric encryption standard. <strong>Used by every TLS connection, every disk encryption, every password manager.</strong> No known practical attacks. Will be weakened by quantum (Grover\'s halves the key strength), so move to AES-256 if you are using AES-128.',
    fn: async (s) => {
      if (!window.crypto || !crypto.subtle) return '[AES unavailable]';
      const enc = new TextEncoder().encode(s);
      const key = await crypto.subtle.generateKey({ name: 'AES-GCM', length: 256 }, true, ['encrypt']);
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc);
      return Array.from(new Uint8Array(ct)).slice(0, 32).map(b => b.toString(16).padStart(2, '0')).join('') + '...';
    }
  },
  {
    name: 'CRYSTALS-Kyber (PQC)',
    era: '2024 (NIST standard)',
    strength: 'pqc',
    desc: '<strong>Post-quantum cryptography.</strong> A lattice-based scheme designed to resist quantum computers running Shor\'s algorithm. Output shown here is a representative sample of an encapsulated key, not the actual scheme.',
    fn: async (s) => {
      // Visual placeholder: hash of input padded to look like a Kyber-1024 ciphertext sample
      if (!window.crypto || !crypto.subtle) return '[PQC unavailable]';
      const enc = new TextEncoder().encode(s + 'kyber-pad');
      const buf = await crypto.subtle.digest('SHA-256', enc);
      const hex = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
      return hex + ':' + hex.split('').reverse().join('').slice(0, 24) + '...';
    }
  }
];

const input = document.getElementById('input');
const ciphersEl = document.getElementById('ciphers');

function buildCards() {
  ciphers.forEach((c, i) => {
    const card = document.createElement('div');
    card.className = 'cipher-card';
    card.innerHTML = `
      <div class="cipher-header">
        <div class="cipher-name">${c.name}</div>
        <span class="cipher-era">${c.era}</span>
        <span class="cipher-strength ${c.strength}">${c.strength === 'pqc' ? 'Post-quantum' : c.strength}</span>
      </div>
      <div class="cipher-output ${c.strength}" id="out-${i}" tabindex="0" title="Click to copy">--</div>
      <div class="copy-hint">Click output to copy</div>
      <div class="cipher-desc">${c.desc}</div>
    `;
    ciphersEl.appendChild(card);
    const out = card.querySelector('.cipher-output');
    out.addEventListener('click', () => {
      const txt = out.textContent;
      if (navigator.clipboard) navigator.clipboard.writeText(txt).then(() => {
        out.classList.add('copied');
        if (window.CyberSounds) CyberSounds.click();
        setTimeout(() => out.classList.remove('copied'), 600);
      });
    });
  });
}

async function update() {
  const text = input.value;
  for (let i = 0; i < ciphers.length; i++) {
    const out = document.getElementById('out-' + i);
    try {
      let result = ciphers[i].fn(text);
      if (result instanceof Promise) result = await result;
      out.textContent = result || '(empty)';
    } catch (e) {
      out.textContent = '[error]';
    }
  }
  if (window.CyberSounds) CyberSounds.tick();
}

let updateTimer = null;
input.addEventListener('input', () => {
  clearTimeout(updateTimer);
  updateTimer = setTimeout(update, 80);
});

document.querySelectorAll('.example-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    input.value = btn.dataset.text;
    if (window.CyberSounds) CyberSounds.click();
    update();
  });
});

buildCards();
update();
</script>
<script src="sounds.js"></script>
</body>
</html>
