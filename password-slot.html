<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Strength Slot Machine | Cyber Games</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    min-height: 100vh;
    min-height: 100dvh;
    background: radial-gradient(ellipse at top, #0a0820 0%, #02000a 80%);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: #e0e0e0;
    overflow-x: hidden;
    padding: 16px 16px 60px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(1px 1px at 50% 50%, #fff, transparent);
    background-size: 200% 200%;
    opacity: 0.2;
    z-index: 0;
    pointer-events: none;
  }

  .container { max-width: 720px; margin: 0 auto; position: relative; z-index: 1; }

  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; flex-wrap: wrap; gap: 8px; }

  .back-link {
    color: #ffaa00; text-decoration: none; font-family: 'Courier New', monospace;
    font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase;
    padding: 6px 12px; border: 1px solid rgba(255, 170, 0, 0.4); border-radius: 20px;
    transition: all 0.2s;
  }
  .back-link:hover, .back-link:focus-visible { background: rgba(255, 170, 0, 0.1); color: #fff; outline: none; }

  header { text-align: center; margin-bottom: 22px; }

  h1 {
    font-size: clamp(1.5rem, 4.5vw, 2.2rem); font-weight: 200;
    letter-spacing: 4px; text-transform: uppercase;
    background: linear-gradient(90deg, #ffaa00, #ff44aa, #00ffff, #ffaa00);
    background-size: 300% 100%;
    -webkit-background-clip: text; background-clip: text; color: transparent;
    animation: hueShift 5s linear infinite;
  }
  @keyframes hueShift { 0% { background-position: 0% 50%; } 100% { background-position: 300% 50%; } }

  .subtitle { color: #c8d8ff; font-size: 0.85rem; letter-spacing: 3px; text-transform: uppercase; margin-top: 8px; font-style: italic; }

  /* Slot machine */
  .machine {
    background: linear-gradient(180deg, #2a1a3a, #1a0a2a);
    border: 3px solid #ffaa00;
    border-radius: 18px;
    padding: 22px 18px;
    margin-bottom: 20px;
    box-shadow:
      0 12px 50px rgba(255, 170, 0, 0.2),
      inset 0 2px 0 rgba(255, 255, 255, 0.1),
      inset 0 -3px 0 rgba(0, 0, 0, 0.4);
    position: relative;
    overflow: hidden;
  }

  .machine::before, .machine::after {
    content: '';
    position: absolute;
    width: 24px; height: 24px;
    border-radius: 50%;
    background: radial-gradient(circle, #ffcc66, #ff8800);
    box-shadow: 0 0 20px #ffaa00;
    top: 18px;
    animation: bulbBlink 1.5s ease-in-out infinite alternate;
  }
  .machine::before { left: 18px; }
  .machine::after { right: 18px; animation-delay: 0.7s; }

  @keyframes bulbBlink {
    from { opacity: 0.4; box-shadow: 0 0 8px #ffaa00; }
    to { opacity: 1; box-shadow: 0 0 24px #ffcc66; }
  }

  .machine-title {
    text-align: center;
    font-family: 'Courier New', monospace;
    font-size: 0.7rem;
    letter-spacing: 3px;
    color: #ffcc66;
    text-shadow: 0 0 10px rgba(255, 170, 0, 0.6);
    margin-bottom: 14px;
    text-transform: uppercase;
  }

  .reels {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    background: rgba(0, 0, 0, 0.5);
    padding: 10px;
    border-radius: 10px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    margin-bottom: 14px;
  }

  .reel {
    height: 70px;
    background: linear-gradient(180deg, #fff, #ddd);
    border-radius: 6px;
    overflow: hidden;
    position: relative;
    box-shadow: inset 0 -10px 20px rgba(0, 0, 0, 0.15), inset 0 4px 8px rgba(0, 0, 0, 0.1);
  }

  .reel-strip {
    position: absolute;
    top: 0; left: 0; right: 0;
    transition: top 2.5s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .reel.spinning .reel-strip {
    transition: none;
    animation: reelSpin 0.1s linear infinite;
  }

  @keyframes reelSpin {
    from { top: 0; }
    to { top: -70px; }
  }

  .reel-cell {
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Courier New', monospace;
    font-size: 0.95rem;
    font-weight: bold;
    color: #1a0a2a;
    padding: 4px;
    text-align: center;
    word-break: break-all;
    line-height: 1.2;
  }

  .password-display {
    background: rgba(0, 0, 0, 0.6);
    border: 1px dashed rgba(255, 255, 255, 0.2);
    border-radius: 8px;
    padding: 14px;
    text-align: center;
    margin-bottom: 14px;
    min-height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .password-text {
    font-family: 'Courier New', monospace;
    font-size: 1.4rem;
    font-weight: bold;
    color: #fff;
    letter-spacing: 1px;
    word-break: break-all;
    text-shadow: 0 0 12px rgba(255, 255, 255, 0.4);
  }

  .password-text.empty {
    color: #888;
    font-size: 1rem;
    font-style: italic;
    font-weight: normal;
  }

  .crack-display {
    background: rgba(0, 0, 0, 0.4);
    border-radius: 8px;
    padding: 12px;
    text-align: center;
  }

  .crack-label {
    font-family: 'Courier New', monospace;
    font-size: 0.65rem;
    letter-spacing: 2px;
    color: #ffcc66;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .crack-time {
    font-family: 'Courier New', monospace;
    font-size: 1.2rem;
    font-weight: bold;
    word-break: break-word;
    line-height: 1.3;
    transition: color 0.4s;
  }

  .crack-time.weak { color: #ff4444; text-shadow: 0 0 12px rgba(255, 68, 68, 0.6); }
  .crack-time.medium { color: #ffaa00; text-shadow: 0 0 12px rgba(255, 170, 0, 0.6); }
  .crack-time.strong { color: #00ff88; text-shadow: 0 0 12px rgba(0, 255, 136, 0.6); }
  .crack-time.legendary {
    background: linear-gradient(90deg, #00ff88, #00ffff, #ff00cc);
    background-size: 200% 100%;
    -webkit-background-clip: text; background-clip: text; color: transparent;
    animation: legendaryGlow 2s linear infinite;
  }
  @keyframes legendaryGlow { from { background-position: 0% 50%; } to { background-position: 200% 50%; } }

  .strength-bar {
    width: 100%;
    height: 8px;
    background: rgba(0, 0, 0, 0.6);
    border-radius: 4px;
    overflow: hidden;
    margin-top: 10px;
  }

  .strength-fill {
    height: 100%;
    width: 0%;
    transition: width 0.6s ease, background 0.4s;
    border-radius: 4px;
  }

  .controls { text-align: center; margin-bottom: 14px; }

  .spin-btn {
    padding: 18px 44px;
    background: linear-gradient(180deg, #ffcc66, #ff8800);
    border: 3px solid #ffeebb;
    color: #1a0a2a;
    border-radius: 30px;
    font-family: inherit;
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 6px 20px rgba(255, 170, 0, 0.4), inset 0 2px 0 rgba(255, 255, 255, 0.4);
    text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.4);
  }

  .spin-btn:hover, .spin-btn:focus-visible {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(255, 170, 0, 0.6), inset 0 2px 0 rgba(255, 255, 255, 0.4);
    outline: none;
  }
  .spin-btn:active { transform: translateY(1px); }
  .spin-btn:disabled { opacity: 0.5; cursor: wait; transform: none; }

  /* Lesson card */
  .lesson {
    background: linear-gradient(135deg, rgba(60, 0, 60, 0.5), rgba(0, 30, 60, 0.5));
    border: 1px solid rgba(0, 255, 255, 0.3);
    border-radius: 14px;
    padding: 16px;
    backdrop-filter: blur(10px);
    margin-bottom: 14px;
    text-align: left;
    display: none;
  }
  .lesson.visible { display: block; animation: revealIn 0.4s ease; }
  @keyframes revealIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .lesson-tag {
    font-family: 'Courier New', monospace;
    font-size: 0.65rem;
    letter-spacing: 2px;
    color: #00ffff;
    text-transform: uppercase;
    margin-bottom: 6px;
    text-shadow: 0 0 8px rgba(0, 255, 255, 0.4);
  }

  .lesson-title {
    font-size: 1rem;
    color: #fff;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .lesson-body {
    font-size: 0.85rem;
    color: #d8e8ff;
    line-height: 1.6;
  }

  .lesson-body strong { color: #ffcc66; }

  /* Stats */
  .stats {
    display: flex;
    justify-content: space-around;
    margin-bottom: 14px;
    background: rgba(0, 0, 30, 0.5);
    padding: 10px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  .stat-cell {
    text-align: center;
    flex: 1;
  }

  .stat-key {
    font-family: 'Courier New', monospace;
    font-size: 0.6rem;
    letter-spacing: 1.5px;
    color: #8aa0c0;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .stat-num {
    font-family: 'Courier New', monospace;
    font-size: 1.1rem;
    font-weight: 700;
    color: #00ffff;
    text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
  }

  @media (max-width: 480px) {
    .password-text { font-size: 1.1rem; }
    .crack-time { font-size: 1rem; }
    .reel-cell { font-size: 0.78rem; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="top-bar">
    <a href="games.html" class="back-link">&#8592; Cyber Games</a>
    <span class="back-link" style="border-color: rgba(0, 255, 255, 0.4); color: #00ffff; cursor: default;">3 reels &middot; entropy lesson</span>
  </div>

  <header>
    <h1>Password Slot Machine</h1>
    <div class="subtitle">Vegas, but for entropy</div>
  </header>

  <div class="stats">
    <div class="stat-cell"><div class="stat-key">Spins</div><div class="stat-num" id="spinCount">0</div></div>
    <div class="stat-cell"><div class="stat-key">Best</div><div class="stat-num" id="bestTime">--</div></div>
    <div class="stat-cell"><div class="stat-key">Worst</div><div class="stat-num" id="worstTime">--</div></div>
  </div>

  <div class="machine">
    <div class="machine-title">PASSWORD ENTROPY-O-MATIC</div>
    <div class="reels" id="reels">
      <div class="reel" data-reel="0"><div class="reel-strip"><div class="reel-cell">?</div></div></div>
      <div class="reel" data-reel="1"><div class="reel-strip"><div class="reel-cell">?</div></div></div>
      <div class="reel" data-reel="2"><div class="reel-strip"><div class="reel-cell">?</div></div></div>
    </div>
    <div class="password-display">
      <div class="password-text empty" id="passwordText">Pull the lever...</div>
    </div>
    <div class="crack-display">
      <div class="crack-label">Time to crack</div>
      <div class="crack-time" id="crackTime">--</div>
      <div class="strength-bar"><div class="strength-fill" id="strengthBar"></div></div>
    </div>
  </div>

  <div class="controls">
    <button class="spin-btn" id="spinBtn" type="button">Spin</button>
  </div>

  <div class="lesson" id="lesson" role="status">
    <div class="lesson-tag">What this teaches</div>
    <div class="lesson-title" id="lessonTitle"></div>
    <div class="lesson-body" id="lessonBody"></div>
  </div>
</div>

<script>
// Each reel produces a category of password fragment.
// We construct the password by joining all three with appropriate joiners.
const REELS = [
  // Reel 1 - common patterns
  [
    { value: '12345', kind: 'numeric_short' },
    { value: 'password', kind: 'common_word' },
    { value: 'qwerty', kind: 'common_word' },
    { value: 'admin', kind: 'common_word' },
    { value: 'letmein', kind: 'common_word' },
    { value: 'Summer', kind: 'predictable_word' },
    { value: 'Spring', kind: 'predictable_word' },
    { value: 'correct', kind: 'passphrase_word' },
    { value: 'horse', kind: 'passphrase_word' },
    { value: 'P@ssw0rd', kind: 'l33t_common' }
  ],
  // Reel 2 - middle
  [
    { value: '2024', kind: 'numeric_year' },
    { value: 'iloveyou', kind: 'common_word' },
    { value: '1990', kind: 'numeric_year' },
    { value: '!', kind: 'symbol' },
    { value: '_', kind: 'symbol' },
    { value: 'battery', kind: 'passphrase_word' },
    { value: 'staple', kind: 'passphrase_word' },
    { value: 'Tx9q', kind: 'random' },
    { value: 'm$Rk2L', kind: 'random' },
    { value: '$', kind: 'symbol' }
  ],
  // Reel 3 - end
  [
    { value: '!', kind: 'symbol' },
    { value: '2024!', kind: 'numeric_year_symbol' },
    { value: '#1', kind: 'common_word' },
    { value: '7gNw#L9pQz', kind: 'random_long' },
    { value: 'Q@nL$mPv', kind: 'random' },
    { value: '"correct horse"', kind: 'passphrase' },
    { value: 'sunset-mountain-pebble', kind: 'passphrase' },
    { value: 'X7@p!2Mq#9wL', kind: 'random_long' },
    { value: '1', kind: 'numeric_short' },
    { value: '0', kind: 'numeric_short' }
  ]
];

const reelEls = document.querySelectorAll('.reel');
const passwordText = document.getElementById('passwordText');
const crackTime = document.getElementById('crackTime');
const strengthBar = document.getElementById('strengthBar');
const spinBtn = document.getElementById('spinBtn');
const lesson = document.getElementById('lesson');
const lessonTitle = document.getElementById('lessonTitle');
const lessonBody = document.getElementById('lessonBody');
const spinCountEl = document.getElementById('spinCount');
const bestTimeEl = document.getElementById('bestTime');
const worstTimeEl = document.getElementById('worstTime');

let spinCount = 0;
let bestSeconds = 0;
let worstSeconds = Infinity;

function calcEntropy(password) {
  let charset = 0;
  if (/[a-z]/.test(password)) charset += 26;
  if (/[A-Z]/.test(password)) charset += 26;
  if (/[0-9]/.test(password)) charset += 10;
  if (/[^a-zA-Z0-9]/.test(password)) charset += 32;
  return password.length * Math.log2(Math.max(charset, 1));
}

function looksDictionary(password) {
  const common = ['password', 'qwerty', '12345', 'admin', 'letmein', 'iloveyou', 'monkey', 'dragon', 'p@ssw0rd', 'summer2024'];
  return common.some(c => password.toLowerCase().includes(c));
}

function looksPassphrase(password) {
  return /^(\w{3,}-){2,}\w{3,}$/.test(password) || /^"[a-z\s]{15,}"$/i.test(password);
}

function calcCrackSeconds(password) {
  const ent = calcEntropy(password);
  // Modern attacker: ~10^11 guesses per second on a single GPU
  const guessesPerSec = 1e11;
  let combos = Math.pow(2, ent) / 2;
  // Dictionary attacks reduce effective space drastically
  if (looksDictionary(password)) combos = Math.min(combos, 1e6);
  // Passphrases of 4+ random words: ~80 bits effective
  if (looksPassphrase(password)) combos = Math.max(combos, Math.pow(2, 70));
  return combos / guessesPerSec;
}

function formatTime(seconds) {
  if (seconds < 0.0001) return 'instant';
  if (seconds < 1) return (seconds * 1000).toFixed(0) + ' ms';
  if (seconds < 60) return seconds.toFixed(1) + ' sec';
  if (seconds < 3600) return (seconds / 60).toFixed(1) + ' min';
  if (seconds < 86400) return (seconds / 3600).toFixed(1) + ' hr';
  if (seconds < 31536000) return (seconds / 86400).toFixed(1) + ' days';
  if (seconds < 31536000 * 1000) return (seconds / 31536000).toFixed(1) + ' yr';
  if (seconds < 31536000 * 1e6) return (seconds / 31536000 / 1e3).toFixed(1) + 'k yr';
  if (seconds < 31536000 * 1e9) return (seconds / 31536000 / 1e6).toFixed(1) + 'M yr';
  if (seconds < 31536000 * 1e12) return (seconds / 31536000 / 1e9).toFixed(1) + 'B yr';
  if (seconds < 31536000 * 1e15) return (seconds / 31536000 / 1e12).toFixed(1) + 'T yr';
  return seconds.toExponential(1) + ' yr';
}

function classifyTime(seconds) {
  if (seconds < 60) return 'weak';
  if (seconds < 86400 * 30) return 'medium';
  if (seconds < 31536000 * 1e6) return 'strong';
  return 'legendary';
}

function lessonFor(password) {
  if (looksDictionary(password)) {
    return {
      title: 'You hit a dictionary word.',
      body: '<strong>Dictionary attacks</strong> try millions of common words and leaked passwords first. Anything resembling "password", "qwerty", or your favorite year is cracked in seconds, no matter how many "!" you add. Length and unpredictability beat tricks.'
    };
  }
  if (looksPassphrase(password)) {
    return {
      title: 'You hit a passphrase.',
      body: 'Four or more random common words is the gold standard. Easy to remember, hard to crack. <strong>"correct horse battery staple"</strong> has more entropy than most random 8-character passwords. Use a passphrase manager and let it pick the words.'
    };
  }
  if (password.length < 10) {
    return {
      title: 'Too short.',
      body: 'Below 10 characters, even random passwords fall to GPU brute-force in hours or days. <strong>Length is the single biggest factor.</strong> A 16-character password is millions of times stronger than a 10-character one with the same character mix.'
    };
  }
  if (/[A-Z]/.test(password) && /[0-9]/.test(password) && /[^a-zA-Z0-9]/.test(password) && password.length >= 12) {
    return {
      title: 'Strong random password.',
      body: 'Mixed case, digits, symbols, length 12+. This is what password managers generate by default. <strong>The catch:</strong> humans cannot memorize this. Use a password manager. Trying to type this from memory means writing it on a sticky note.'
    };
  }
  return {
    title: 'Decent but improvable.',
    body: 'Add length, swap predictable patterns (years, names) for random tokens, or switch to a passphrase. The fix that changes everything is <strong>using a password manager</strong>: it makes every password a strong unique random string and you only memorize one master.'
  };
}

function spin() {
  spinBtn.disabled = true;
  if (window.CyberSounds) CyberSounds.click();
  passwordText.classList.add('empty');
  passwordText.textContent = 'Spinning...';
  crackTime.textContent = '--';
  crackTime.className = 'crack-time';
  strengthBar.style.width = '0%';
  lesson.classList.remove('visible');

  const results = [];
  reelEls.forEach((reelEl, i) => {
    reelEl.classList.add('spinning');
    if (window.CyberSounds) {
      const tickInterval = setInterval(() => CyberSounds.tick(), 80);
      setTimeout(() => clearInterval(tickInterval), 1100 + i * 600);
    }
  });

  reelEls.forEach((reelEl, i) => {
    setTimeout(() => {
      const pool = REELS[i];
      const pick = pool[Math.floor(Math.random() * pool.length)];
      results[i] = pick;
      reelEl.classList.remove('spinning');
      reelEl.querySelector('.reel-strip').innerHTML = `<div class="reel-cell">${pick.value}</div>`;
      if (window.CyberSounds) CyberSounds.pop();
      if (i === 2) finalizeSpin(results);
    }, 1100 + i * 600);
  });
}

function finalizeSpin(results) {
  // Build password. If passphrase words appear together, join with hyphens.
  const isPassphraseRun = results.every(r => r.kind === 'passphrase_word' || r.kind === 'passphrase');
  let password;
  if (isPassphraseRun) {
    password = results.map(r => r.value).join('-');
  } else {
    password = results.map(r => r.value).join('');
  }

  passwordText.classList.remove('empty');
  passwordText.textContent = password;

  const seconds = calcCrackSeconds(password);
  const cls = classifyTime(seconds);
  crackTime.textContent = formatTime(seconds);
  crackTime.className = 'crack-time ' + cls;

  const ent = calcEntropy(password);
  const pct = Math.min(100, (ent / 100) * 100);
  strengthBar.style.width = pct + '%';
  if (cls === 'weak') strengthBar.style.background = 'linear-gradient(90deg, #ff4444, #ff6b88)';
  else if (cls === 'medium') strengthBar.style.background = 'linear-gradient(90deg, #ffaa00, #ffcc66)';
  else if (cls === 'strong') strengthBar.style.background = 'linear-gradient(90deg, #00ff88, #66ffaa)';
  else strengthBar.style.background = 'linear-gradient(90deg, #00ff88, #00ffff, #ff00cc)';

  const l = lessonFor(password);
  lessonTitle.textContent = l.title;
  lessonBody.innerHTML = l.body;
  lesson.classList.add('visible');

  spinCount++;
  spinCountEl.textContent = spinCount;
  if (seconds > bestSeconds) { bestSeconds = seconds; bestTimeEl.textContent = formatTime(seconds); }
  if (seconds < worstSeconds) { worstSeconds = seconds; worstTimeEl.textContent = formatTime(seconds); }

  spinBtn.disabled = false;
  if (window.CyberSounds) {
    if (cls === 'legendary') CyberSounds.win();
    else if (cls === 'strong') CyberSounds.correct();
    else if (cls === 'weak') CyberSounds.wrong();
  }
}

spinBtn.addEventListener('click', spin);
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ' ') {
    if (e.target.tagName === 'INPUT') return;
    e.preventDefault();
    if (!spinBtn.disabled) spin();
  }
});
</script>
<script src="sounds.js"></script>
</body>
</html>
